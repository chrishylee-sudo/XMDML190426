<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>显密度母林佛学会 · 诵经屏</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#b05a00;--accent-light:#d4720a;--accent-dim:#c8824a;
  --bar-bg:#f5f0e8;--bg:#ffffff;
  --text-main:#1a1a1a;--text-en:#555550;--text-ph:#b05a00;
  --div:#ddd8ce;--timer-col:#7a4a10;
  --f-serif:"PingFang SC","Hiragino Sans GB","STSong","SimSun",serif;
  --f-sans:"PingFang SC","Hiragino Sans GB","STHeiti","Microsoft YaHei",sans-serif;
  --f-latin:Georgia,"Times New Roman",serif;
}
html,body{height:100%;background:var(--bg);color:var(--text-main);font-family:var(--f-serif);overflow:hidden;-webkit-text-size-adjust:100%;}

/* BAR */
#bar{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(245,240,232,.99);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
.s-btn{font-family:var(--f-serif);font-size:11px;letter-spacing:.05em;padding:5px 11px;border-radius:16px;border:1px solid #c8b89a;background:transparent;color:#8a6a3a;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.s-btn.on{background:#b05a00;color:#fff;border-color:#b05a00;}
.s-btn:hover:not(.on){border-color:#b05a00;color:#b05a00;}
.sep{width:1px;height:22px;background:var(--div);flex-shrink:0;}
.c-btn{width:30px;height:30px;border-radius:50%;border:1px solid #c8b89a;background:transparent;color:#8a6a3a;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.c-btn:hover{background:#b05a00;color:#fff;border-color:#b05a00;}
#sp-lbl{font-family:var(--f-sans);font-size:10px;color:#8a6a3a;letter-spacing:.1em;white-space:nowrap;}
#sp{-webkit-appearance:none;width:80px;height:2px;background:#ddd8ce;border-radius:2px;outline:none;cursor:pointer;}
#sp::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#b05a00;cursor:pointer;}
.push{flex:1;}
#timer{font-family:var(--f-latin);font-size:21px;color:var(--timer-col);letter-spacing:.1em;min-width:50px;text-align:right;}
#fs-btn{width:30px;height:30px;border-radius:50%;border:1px solid #c8b89a;background:transparent;color:#8a6a3a;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#fs-btn:hover{color:#b05a00;border-color:#b05a00;}

/* FADES */
#ft{position:fixed;top:58px;left:0;right:0;height:80px;background:linear-gradient(180deg,var(--bg),transparent);z-index:100;pointer-events:none;}
#fb{position:fixed;bottom:0;left:0;right:0;height:110px;background:linear-gradient(0deg,var(--bg),transparent);z-index:100;pointer-events:none;}

/* SCROLL */
#wrap{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;}
#content{padding:140px 0 220px;will-change:transform;}

/* TITLE */
.title-block{text-align:center;padding:0 10% 50px;border-bottom:1px solid var(--div);margin-bottom:50px;}
.t-num{font-family:var(--f-sans);font-size:11px;letter-spacing:.22em;color:#8a6a3a;text-transform:uppercase;margin-bottom:10px;}
.t-cn{font-family:var(--f-serif);font-size:34px;font-weight:600;color:#3a2010;letter-spacing:.22em;margin-bottom:8px;}
.t-en{font-family:var(--f-latin);font-size:18px;color:#8a6a3a;font-style:italic;letter-spacing:.05em;}
.t-orn{color:#c8b89a;font-size:15px;letter-spacing:.3em;margin-top:14px;}

/* VERSE */
.v{padding:28px 10%;border-bottom:1px solid var(--div);}
.tb{font-family:var(--f-serif);font-size:18px;color:#aaa;line-height:1.75;margin-bottom:6px;letter-spacing:.03em;}
.ph{font-family:var(--f-sans);font-size:30px;color:#b0a500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;line-height:1.5;font-weight:700;}
.combo{font-size:30px;line-height:1.65;margin-bottom:8px;}
.combo .pron{font-family:var(--f-sans);color:#006a6a;font-weight:700;letter-spacing:.08em;}
.combo .sep{color:#bbb;font-weight:300;margin:0 12px;}
.combo .mean{font-family:var(--f-serif);color:#1a1a1a;font-weight:400;letter-spacing:.18em;}
.en{font-family:var(--f-latin);font-size:15px;color:#888880;letter-spacing:.04em;line-height:1.6;font-style:italic;margin-top:6px;}

/* MANTRA — centred */
.v.fw{text-align:center;}
.v.fw .ph{font-size:26px;}
.v.fw .combo{font-size:26px;}
.v.fw .en{font-size:14px;}

/* SECTION DIVIDER */
.sec-div{text-align:center;padding:30px 10% 10px;font-family:var(--f-sans);font-size:11px;letter-spacing:.28em;color:#b05a00;border-top:1px solid var(--div);}

/* PROGRESS + STATUS */
#prog{position:fixed;bottom:0;left:0;height:3px;background:#b05a00;z-index:300;transition:width .15s linear;width:0;}
#status{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--f-sans);font-size:10px;color:#b89a70;letter-spacing:.18em;z-index:300;}
</style>
</head>

<div id="ft"></div>

let cur=0,playing=false,pos=0,speed=3,elapsed=0,raf=null,last=null;

function render(i){
  const s=S[i];
  let h=`<div class="title-block"><div class="t-num">第 ${s.num} 部</div><div class="t-cn">${s.cn}</div><div class="t-en">${s.en}</div><div class="t-orn">❧ ❧ ❧</div></div>`;
  s.items.forEach(it=>{
    if(it.t==='sec'){
      h+=`<div class="sec-div">${it.label}</div>`;
      return;
    }
    const tb=it.tb?`<div class="tb">${it.tb}</div>`:'';
    const combo=(it.cn2||it.cn)?`<div class="combo">${it.cn2?`<span class="pron">${it.cn2}</span>`:''}${(it.cn2&&it.cn)?`<span class="sep">/</span>`:''}${it.cn?`<span class="mean">${it.cn}</span>`:''}</div>`:'';
    const en=it.en?`<div class="en">${it.en}</div>`:'';
    if(it.t==='fw'){
      h+=`<div class="v fw">${tb}<div class="ph">${it.ph}</div>${combo}${en}</div>`;
    } else {
      h+=`<div class="v">${tb}<div class="ph">${it.ph}</div>${combo}${en}</div>`;
    }
  });
  document.getElementById('content').innerHTML=h;
  pos=0;
  document.getElementById('content').style.transform='translateY(0px)';
  updateProg();
}

function go(i){
  cur=i;
  for(let j=0;j<6;j++) document.getElementById('b'+j).classList.toggle('on',j===i);
  stopPlay(); elapsed=0; updateTimer(); render(i);
}

function reset(){pos=0;document.getElementById('content').style.transform='translateY(0px)';stopPlay();elapsed=0;updateTimer();updateProg();}

function maxS(){
  const c=document.getElementById('content'),w=document.getElementById('wrap');
  return Math.max(0,c.scrollHeight-w.clientHeight);
}

function tick(ts){
  if(!last)last=ts;
  const dt=(ts-last)/1000;last=ts;
  elapsed+=dt; updateTimer();
  pos=Math.min(pos+speed*0.55*dt*60,maxS());
  document.getElementById('content').style.transform=`translateY(-${pos}px)`;
  updateProg();
  if(pos>=maxS()){stopPlay();return;}
  raf=requestAnimationFrame(tick);
}

function togglePlay(){playing?stopPlay():startPlay();}
function startPlay(){if(pos>=maxS())pos=0;playing=true;last=null;document.getElementById('pb').textContent='⏸';document.getElementById('status').textContent='▶ PLAYING';raf=requestAnimationFrame(tick);}
function stopPlay(){playing=false;last=null;if(raf){cancelAnimationFrame(raf);raf=null;}document.getElementById('pb').textContent='▶';document.getElementById('status').textContent='■ PAUSED';}
function setSpeed(v){speed=v;}
function updateTimer(){const m=Math.floor(elapsed/60),s=Math.floor(elapsed%60);document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;}
function updateProg(){const p=maxS()>0?(pos/maxS()*100):0;document.getElementById('prog').style.width=p+'%';}
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowUp'){pos=Math.max(0,pos-100);document.getElementById('content').style.transform=`translateY(-${pos}px)`;updateProg();}
  if(e.code==='ArrowDown'){pos=Math.min(maxS(),pos+100);document.getElementById('content').style.transform=`translateY(-${pos}px)`;updateProg();}
  if(e.key>='1'&&e.key<='6')go(+e.key-1);
  if(e.code==='KeyF')toggleFS();
  if(e.code==='KeyR')reset();
});

render(0);

// Touch scroll support
let touchY=0;
document.getElementById('wrap').addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;},{passive:true});
document.getElementById('wrap').addEventListener('touchmove',e=>{
  const dy=touchY-e.touches[0].clientY;
  touchY=e.touches[0].clientY;
  pos=Math.max(0,Math.min(maxS(),pos+dy));
  document.getElementById('content').style.transform=`translateY(-${pos}px)`;
  updateProg();
},{passive:true});
</script>
